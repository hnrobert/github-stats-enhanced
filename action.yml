name: "GitHub Stats Enhanced"
description: "Generate GitHub stats SVG cards for profile README"
author: "hnrobert"

branding:
  icon: "bar-chart-2"
  color: "blue"
inputs:
  github_user_name:
    description: "GitHub username to generate stats for. Defaults to GITHUB_REPOSITORY_OWNER (the repo owner) if not set."
    required: false
    default: ""
  self_github_token:
    description: "Personal GitHub token (overrides GITHUB_TOKEN). Use this if the default token lacks permissions for private repos or org data."
    required: false
    default: ""
  github_token:
    description: "GitHub token for API access"
    required: false
    default: ""
  mode:
    description: "Pipeline mode: 'all' (fetch + generate), 'fetch' (API → stats.yml only), 'generate' (stats.yml → SVGs only)"
    required: false
    default: "all"
  data_file:
    description: "Path to the stats YAML file (used by fetch to write, generate to read)"
    required: false
    default: ""
  output_dir:
    description: "Output directory for generated SVGs"
    required: false
    default: "dist"
  theme:
    description: "Card theme: adaptive (auto dark/light), dark, or light"
    required: false
    default: "adaptive"
  exclude_repos:
    description: "Comma-separated repos to exclude from language stats (owner/repo)"
    required: false
    default: ""
  contrib_exclude_repos:
    description: "Comma-separated repos to exclude from contribution stats (owner/repo)"
    required: false
    default: ""
  responsive:
    description: "Set to 'true' to generate SVGs with width=100% (scales to container width)"
    required: false
    default: "true"
  stats_width:
    description: "Width in pixels for stats cards (default: 220)"
    required: false
    default: ""
  stats_height:
    description: "Height in pixels for stats cards (default: 200)"
    required: false
    default: ""
  contributions_width:
    description: "Width in pixels for contributions card (default: 460)"
    required: false
    default: ""
  contributions_height:
    description: "Height in pixels for contributions card (default: 180)"
    required: false
    default: ""
  languages_width:
    description: "Width in pixels for languages card (default: 500)"
    required: false
    default: ""
  languages_count:
    description: "Number of languages to display in the languages card (default: 8)"
    required: false
    default: ""
  exclude_languages:
    description: "Comma-separated list of languages to exclude"
    required: false
    default: ""
  weight_contributed_repos:
    description: "Set to 'false' to count contributed (non-own) repo languages at full weight instead of by commit ratio"
    required: false
    default: "true"
  generate_report:
    description: "Generate README.md (stats report) and index.html (demo page) alongside SVGs"
    required: false
    default: "true"
  target_repo:
    description: "Repository name where SVGs are stored (defaults to GITHUB_REPOSITORY_NAME env var, then github_user_name)"
    required: false
    default: ""
  target_branch:
    description: "Branch name where SVGs are stored"
    required: false
    default: "github-stats-enhanced"

runs:
  using: "node24"
  main: "dist/index.js"
