# Copy this file to .github/workflows/github-stats.yml in your profile repo
# (the repo named <your-username>/<your-username>)
#
# Token setup (choose one):
#   Option A — default: the auto-provided GITHUB_TOKEN is used automatically.
#   Option B — personal token: create a PAT with `repo` + `read:user` scopes,
#              add it as a secret named SELF_GITHUB_TOKEN in your profile repo,
#              then set `self_github_token: ${{ secrets.SELF_GITHUB_TOKEN }}`.
#              Use this if you want private repo data or org contribution stats.
#
# The generated SVGs are pushed to the branch set by `target_branch` (default: github-stats-enhanced).
# Fixed-size files (always generated):
#   ![Stats1](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/stats1-adaptive.svg)
#   ![Stats2](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/stats2-adaptive.svg)
#   ![Contributions](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/contributions-adaptive.svg)
#   ![Languages](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/languages-adaptive.svg)
# Responsive files (generated when responsive: "true", scale to container width):
#   ![Stats1](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/stats1-adaptive-responsive.svg)
#   ![Stats2](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/stats2-adaptive-responsive.svg)
#   ![Contributions](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/contributions-adaptive-responsive.svg)
#   ![Languages](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/YOUR_BRANCH/languages-adaptive-responsive.svg)
#
# Pipeline modes (mode):
#   mode: "all"      — fetch from GitHub API + generate SVGs in one step (default)
#   mode: "fetch"    — fetch from GitHub API and save to stats.yml only
#   mode: "generate" — read stats.yml and generate SVGs only (no API call)
#
# Fetch strategy (fetch_mode, applies when mode is "all" or "fetch"):
#   fetch_mode: "full"        — re-fetch commit counts for all repos (default)
#   fetch_mode: "incremental" — reuse cached per-repo commit counts from data_file;
#                               only fetches repos not present in the previous stats.yml.
#                               Pair with actions/cache to persist stats.yml between runs.

name: GitHub Stats

on:
  schedule:
    - cron: "30 0 * * *" # daily at 00:30 UTC
  push:
    paths:
      - ".github/workflows/github-stats.yml"
  workflow_dispatch:
    inputs:
      username:
        description: "GitHub username (defaults to repo owner)"
        required: false
      theme:
        description: "Card theme: adaptive, dark, or light"
        required: false
        default: "adaptive"

# ── Option A: single-step (default) ──────────────────────────────────────────
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@main

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore stats cache
        uses: actions/cache@v4
        with:
          path: dist/stats.yml  # must match output_dir + "/stats.yml" (or data_file if set)
          key: github-stats-${{ github.repository_owner }}-${{ steps.date.outputs.date }}
          restore-keys: |
            github-stats-${{ github.repository_owner }}-

      - name: Generate GitHub Stats SVGs
        uses: hnrobert/github-stats-enhanced@main
        with:
          github_user_name: ${{ inputs.username || github.repository_owner }}
          # Token priority: SELF_GITHUB_TOKEN > GITHUB_TOKEN (auto-provided)
          # self_github_token: ${{ secrets.SELF_GITHUB_TOKEN }}  # uncomment to use PAT
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Pipeline mode: "all" | "fetch" | "generate"
          mode: "all"

          # Fetch strategy: "incremental" (default) | "full"
          # "incremental" reuses cached per-repo commit counts from dist/stats.yml
          # (restored above); only fetches new repos. Falls back to full fetch if no cache.
          # fetch_mode: "incremental"

          # Output directory for generated SVG files
          output_dir: dist

          # Card theme: adaptive (follows system dark/light), dark, light
          theme: ${{ inputs.theme || 'adaptive' }}

          # Responsive SVGs (width="100%", scales to container)
          # Set to "false" for fixed pixel dimensions
          responsive: "true"
          generate_report: "true"   # also writes README.md + index.html

          # --- Card dimensions (pixels) ---
          # stats_width: "220"
          # stats_height: "200"
          # contributions_width: "460"
          # contributions_height: "180"
          # languages_width: "500"

          # Number of languages to display (default: 8)
          # languages_count: "8"

          # Comma-separated languages to exclude from language stats
          # exclude_languages: "HTML,CSS,SCSS"

          # Comma-separated owner/repo pairs to exclude from language stats
          # exclude_repos: "your-username/some-private-repo"

          # Comma-separated owner/repo pairs to exclude from contribution stats only
          # contrib_exclude_repos: "your-username/some-private-repo"

          # Weight contributed (non-own) repo languages by your commit ratio
          # Set to "false" to count all languages at full weight
          # weight_contributed_repos: "true"

          # Repository where SVGs are stored (defaults to current repo name, then github_user_name)
          # target_repo: "your-username"

          # Branch where SVGs are pushed and served from
          # target_branch: "github-stats-enhanced"

      - name: Deploy to github-stats-enhanced branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: github-stats-enhanced
          build_dir: dist
          commit_message: "chore: update GitHub stats [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

