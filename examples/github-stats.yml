# Copy this file to .github/workflows/github-stats.yml in your profile repo
# (the repo named <your-username>/<your-username>)
#
# Required: add GITHUB_TOKEN to your repo secrets, or rely on the auto-provided one.
# The generated SVGs are pushed to the `github-stats-enhanced` branch and can be referenced
# in your profile README as:
#
#   ![Stats1](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/github-stats-enhanced/stats1-adaptive.svg)
#   ![Stats2](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/github-stats-enhanced/stats2-adaptive.svg)
#   ![Contributions](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/github-stats-enhanced/contributions-adaptive.svg)
#   ![Languages](https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_USERNAME/github-stats-enhanced/languages-adaptive.svg)

name: GitHub Stats

on:
  schedule:
    - cron: "30 0 * * *"   # daily at 00:30 UTC
  push:
    paths:
      - ".github/workflows/github-stats.yml"
  workflow_dispatch:
    inputs:
      username:
        description: "GitHub username (defaults to repo owner)"
        required: false
      theme:
        description: "Card theme: adaptive, dark, or light"
        required: false
        default: "adaptive"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@main

      - name: Generate GitHub Stats SVGs
        uses: hnrobert/github-stats-enhanced@main
        with:
          github_user_name: ${{ inputs.username || github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

          # Output directory for generated SVG files
          output_dir: dist

          # Card theme: adaptive (follows system dark/light), dark, light
          theme: ${{ inputs.theme || 'adaptive' }}

          # Responsive SVGs (width="100%", scales to container, preserveAspectRatio="none")
          # Set to "false" for fixed pixel dimensions
          responsive: "true"

          # --- Card dimensions (pixels) ---
          # Uncomment and set to override defaults
          # stats_width: "220"
          # stats_height: "200"
          # contributions_width: "460"
          # contributions_height: "180"
          # languages_width: "500"

          # Number of languages to display in the languages card (default: 8)
          # languages_count: "8"

          # Comma-separated languages to exclude from the languages card
          # exclude_languages: "HTML,CSS,SCSS"

          # Comma-separated owner/repo pairs to exclude from stats
          # exclude_repos: "your-username/some-private-repo"

      - name: Deploy to github-stats-enhanced branch
        uses: crazy-max/ghaction-github-pages@main
        with:
          target_branch: github-stats-enhanced
          build_dir: dist
          commit_message: "chore: update GitHub stats [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
