name: Build

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@main
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Build dist/index.js
        run: bun build src/index.ts --outfile dist/index.js --target node

      - name: Commit dist/index.js if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/index.js
          if git diff --cached --quiet; then
            echo "No changes to dist/index.js"
          else
            git commit -m "chore: update dist [skip ci]"
            git push origin HEAD:main
          fi

      - name: Sync develop with main
        run: |
          git fetch origin develop || true
          if git show-ref --verify --quiet refs/remotes/origin/develop; then
            git checkout develop
            if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
              git merge --ff-only origin/main && git push origin develop
            else
              echo "develop is already up to date"
            fi
          else
            git checkout -b develop
            git push origin develop
          fi
