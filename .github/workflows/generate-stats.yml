name: Generate GitHub Stats SVGs

on:
  schedule:
    # Run daily at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      username:
        description: "GitHub username (defaults to repo owner)"
        required: false
      theme:
        description: "Card theme (adaptive, dark, or light)"
        required: false
        default: "adaptive"

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build action
        run: bun build src/index.ts --outfile dist/index.js --target node

      - name: Generate GitHub Stats SVGs
        uses: ./
        with:
          github_user_name: ${{ inputs.username || github.repository_owner }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          output_dir: dist
          theme: ${{ inputs.theme || 'adaptive' }}
          # Optional: comma-separated list of languages to exclude
          # exclude_languages: "HTML,CSS"
          # Optional: comma-separated list of repos to exclude
          # exclude_repos: "owner/private-repo"

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore: update GitHub stats [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
