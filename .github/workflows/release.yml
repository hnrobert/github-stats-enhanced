name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
      prerelease:
        description: "Is this a pre-release?"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Build dist/index.js
        run: bun build src/index.ts --outfile dist/index.js --target node

      - name: Bump version in package.json
        run: |
          VERSION="${{ inputs.version }}"
          # strip leading 'v' if provided
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit dist and package.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/index.js package.json
          git commit -m "chore: release v${{ inputs.version }}"

      - name: Create and push tag
        run: |
          TAG="v${{ inputs.version }}"
          PRERELEASE="${{ inputs.prerelease }}"
          git tag -a "$TAG" -m "Release $TAG${PRERELEASE:+ (pre-release)}"
          git push origin HEAD:main --follow-tags
